<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MadLibs Project</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">

    <!-- google fonts link -->

    <link rel="stylesheet" href="styles.css">

    <script src="script.js" defer></script>

</head>
<body>
    <header><h1>The Wish Contract</h1></header>

    <main>
        <form class="madLibForm">
            <!-- Getting words from the user -->
            <label for="time">Duration of Time: </label><input type="text" id="time" required>

            <label for="kitchenItem">Kitchen Item: </label><input type="text" id="kitchenItem" required>

            <label for="pluralNoun">Plural Noun: </label><input type="text" id="pluralNoun" required>

            <label for="noun">Noun: </label><input type="text" id="noun" required>

            <label for="animal">Animal Noise Ending in -ing: </label><input type="text" id="animal" required>

            <label for="drink">Drink: </label><input type="text" id="drink" required>

            <label for="verb">Verb Ending in -ing: </label><input type="text" id="verb" required>

            <label for="number">Number: </label><input type="text" id="number" required>

            <label for="person">Name of a Person: </label><input type="text" id="person" required>

            <label for="name">Your Name: </label><input type="text" id="name" required>

            <input type="submit">
        </form>

        <article class="story">
            <h2>The Wish Contract</h2>

            
        </article>
        
    </main>
</body>
</html>
